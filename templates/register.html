<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

    <h2>User Registration</h2>

    <form>

        <label>Full Name</label>
        <input type="text">

        <br><br>

        <label>Email</label>
        <input type="email">

        <br><br>

        <label>Password</label>
        <input type="password">

        <br><br>

        <label>Role</label>

        <select>
            <option>Patient</option>
            <option>Doctor</option>
            <option>Admin</option>
        </select>

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>

</body>
</html>
